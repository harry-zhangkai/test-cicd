# GitHub Actions Workflow 配置文件
# 文件名：.github/workflows/dev-deploy-pipeline.yml
#
# 触发条件：当 main分支有代码提交（push）或合并请求（pull_request）时自动执行
# 流程包括：构建、测试、Docker 镜像打包、通过 Rancher 部署到 K8s

name: Main Deploy Pipeline

# ✅ 权限定义
permissions:
  contents: read   # 拉取代码需要
  packages: write  # 推送镜像到 GHCR 需要

# 触发器配置
on:
  push:
    branches:
      - main                    # main分支的代码提交时触发
  pull_request:
    branches:
      - main                    # main分支的合并请求时触发

# 全局环境变量
env:
  REGISTRY: ghcr.io                     # Docker 镜像仓库地址（GitHub Container Registry）
  IMAGE_NAME: ${{ github.repository }}  # 镜像名称使用仓库名
  JAVA_VERSION: '17'                    # Java 版本


# 定义作业（Jobs）
jobs:

  # ========== 作业 2: 构建 Docker 镜像 ==========
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest             # 运行环境

    steps:
      # 步骤 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2: 配置 JDK 17（用于构建应用）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # 步骤 3: 构建 Spring Boot 应用
      - name: Build application
        run: ./gradlew build -x test  # -x test 表示跳过测试（已在上一作业执行）

      # 步骤 4: 配置 Docker Buildx（支持多平台构建）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤 5: 登录到 GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}         # 仓库地址
          username: ${{ github.actor }}         # 当前用户
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动提供的 token

      # 步骤 6: 生成 Docker 镜像元数据（标签和标签）
      - name: Extract metadata (tags, labels)
        id: meta                                    # 步骤 ID，供后续引用
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr         # 基于 PR 引用生成标签
            type=sha,prefix=main-     # 基于 commit SHA 生成标签，前缀 main-

      # 步骤 7: 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                               # 构建上下文（当前目录）
          file: ./Dockerfile                       # Dockerfile 路径
          push: true                               # 推送到仓库
          tags: ${{ steps.meta.outputs.tags }}     # 使用步骤 6 生成的标签
          labels: ${{ steps.meta.outputs.labels }} # 使用步骤 6 生成的标签
          cache-from: type=gha                     # 使用 GitHub Actions 缓存
          cache-to: type=gha,mode=max              # 最大化缓存

  # ========== 作业 3: 通过已有的 Rancher 平台部署 ==========
  deploy-with-rancher:
    name: Deploy with Rancher          # 作业显示名称
    needs: build-image                 # 依赖关系：必须在 build-image 成功后执行
    runs-on: ubuntu-latest             # 运行环境

    steps:
      # 步骤 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2: 设置镜像标签为当前 commit SHA
      - name: Get image tag
        id: image_tag
        run: echo "IMAGE_TAG=sha-${{ github.sha }}" >> $GITHUB_OUTPUT

      # 步骤 3: 安装 kubectl 工具
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'  # kubectl 版本

      # 步骤 4: 配置 Kubernetes 集群连接（使用已有的 Rancher 平台）
      - name: Configure kubeconfig from Rancher
        run: |
          mkdir -p ~/.kube
          # 从 GitHub Secrets 读取 Rancher 平台的 kubeconfig（base64 编码）
          echo "${{ secrets.RANCHER_KUBECONFIG }}" > ~/.kube/config

      # 步骤 5: 部署应用到 Rancher 管理的 Kubernetes 集群
      - name: Deploy to Kubernetes cluster (via Rancher)
        run: |
          # 验证连接
          kubectl cluster-info
          
          # 查看命名空间
          kubectl get namespaces
          
          # 应用 Kubernetes 部署配置
          kubectl apply -f k8s/deployment.yaml -n dev-deploy
          
          # 更新容器镜像为新构建的版本
          kubectl set image deployment/test-cicd \
            test-cicd=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image_tag.outputs.IMAGE_TAG }} \
            -n dev-deploy
          
          # 等待部署完成
          kubectl rollout status deployment/test-cicd -n dev-deploy --timeout=300s

      # 步骤 6: 验证部署状态
      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment test-cicd -n dev-deploy
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n dev-deploy -l app=test-cicd
          echo ""
          echo "=== Service Status ==="
          kubectl get svc -n dev-deploy
