# GitHub Actions Workflow 配置文件
# 触发条件：当 main 分支有代码提交（push）或合并请求（pull_request）时自动执行
# 流程包括：构建、测试、代码扫描、Docker 镜像打包、通过 Rancher 部署到 K8s

name: Build Image

# ✅ 权限定义
permissions:
  contents: read           # 拉取代码
  packages: write          # 推送 Docker 镜像到 GHCR
  pull-requests: write     # 添加 PR 评论
  actions: read            # 读取工作流运行信息
  checks: write            # 写入检查结果
  statuses: write          # 写入提交状态

# 触发器配置：只允许手动触发
on:
  workflow_dispatch:       # ← 手动触发
    inputs:
      environment:
        description: 'Select environment'
        required: true
        type: choice
        options:
          - dev
          - test
          - uat
          - prod
        default: dev
      version:
        description: 'Version tag (optional, max 10 chars)'
        required: false
        type: string
        default: ''

# 全局环境变量
env:
  REGISTRY: 090882153757.dkr.ecr.sa-east-1.amazonaws.com                 # Docker 镜像仓库地址
  JAVA_VERSION: '17'                    # Java 版本

